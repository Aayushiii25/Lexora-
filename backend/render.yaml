services:
  - type: web
    name: lexora-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/chroma_data
      - key: CORS_ORIGINS
        value: '["https://lexora.vercel.app"]'
    disk:
      name: chroma-data
      mountPath: /opt/render/project/chroma_data
      sizeGB: 1
